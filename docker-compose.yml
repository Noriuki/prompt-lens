version: "3.9"

services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: prompt-lens-api
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    ports:
      - "8000:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    command: uvicorn src.presentation.api.app:app --host 0.0.0.0 --port 8000

  web:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: prompt-lens-web
    ports:
      - "5173:3000"
    depends_on:
      - api
